services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zerova
      POSTGRES_USER: zerova
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zerova_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerova -d zerova"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file: .env
    environment:
      DATABASE_URL: postgresql://zerova:${POSTGRES_PASSWORD:-zerova_dev}@postgres:5432/zerova
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  vault_manager:
    build: ./backend
    command: python -m vault_manager.main
    env_file: .env
    environment:
      DATABASE_URL: postgresql://zerova:${POSTGRES_PASSWORD:-zerova_dev}@postgres:5432/zerova
      REDIS_URL: redis://redis:6379
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_PRIVY_APP_ID: ${VITE_PRIVY_APP_ID:-placeholder-dev-id}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  postgres_data:
  redis_data:
